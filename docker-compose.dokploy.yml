# Dokploy deployment for Noozha (piscine-chelles)

name: noozha

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  frontend:
    container_name: noozha-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_API_URL: ${VITE_API_URL:-https://api.noozha.fr}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    ports:
      - "31847:80"
    labels:
      - "traefik.enable=true"
    networks:
      - dokploy-network
    logging: *default-logging
    restart: always

  postgres:
    container_name: noozha-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noozha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: noozha
    volumes:
      - noozha-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noozha -d noozha"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dokploy-network
    logging: *default-logging
    restart: always

  api:
    container_name: noozha-api
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://noozha:${POSTGRES_PASSWORD}@noozha-postgres:5432/noozha
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://noozha.fr}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ENABLE_API_DOCS: "false"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      - "traefik.enable=true"
    networks:
      - dokploy-network
    logging: *default-logging
    restart: always

volumes:
  noozha-pg-data:

networks:
  dokploy-network:
    external: true
